<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN // RETRO ARCADE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">

  <div class="screen">
    <div class="panel">

      <div class="panel-titlebar">
        <div class="title">SYSTEM LOGIN</div>
      </div>

      <div class="panel-body">

        <div class="sys-header">
          <div class="logo">RETRO<span style="color:var(--accent);">ARCADE</span></div>
          <div class="tagline">PRIVATE ACCESS TERMINAL &nbsp;v1.0.0</div>
        </div>

        <hr class="divider" />

        <div class="prompt-line">
          &gt; <span id="sys-prompt"></span><span class="cursor"></span>
        </div>

        <form id="login-form" novalidate>
          <div class="field-group">
            <label class="field-label" for="password-input">
              <span class="arrow">▶</span> ACCESS CODE
            </label>
            <input
              type="password"
              id="password-input"
              autocomplete="current-password"
              spellcheck="false"
              placeholder="_ _ _ _ _ _ _ _ _ _"
              autofocus
            />
          </div>

          <div class="field-group">
            <label class="field-label">
              <span class="arrow">▶</span> LOAD SAVE FILE
              <span style="color:var(--text-dim);font-size:0.65rem;margin-left:6px;">(OPTIONAL)</span>
            </label>
            <div class="file-drop-zone" id="file-drop-zone">
              <input type="file" id="save-file-input" accept=".json" />
              <div class="file-drop-label">
                <span id="file-drop-text">◈ DROP .JSON SAVE FILE OR CLICK TO BROWSE</span>
              </div>
            </div>
            <div id="file-status" class="file-status"></div>
          </div>

          <button type="submit" class="btn" id="login-btn">
            <span>[ AUTHENTICATE ]</span>
          </button>
        </form>

        <div id="login-msg" class="msg hidden" aria-live="polite"></div>

      </div>

      <div class="statusbar">
        <span>CONN: SECURE</span>
        <span class="ok">● ONLINE</span>
        <span>SYS: NOMINAL</span>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
